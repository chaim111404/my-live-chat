<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="https://i.postimg.cc/yN54qXdM/IMG-0697.png"/>
<link rel="apple-touch-icon" href="https://i.postimg.cc/yN54qXdM/IMG-0697.png"/>
<meta property="og:image" content="https://i.postimg.cc/yN54qXdM/IMG-0697.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>WebDesk Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════
   משתני ערכת כהה/בהירה
════════════════════════════════════ */
:root {
  --bg0:#0f172a; --bg1:#1e293b; --bg2:#263044; --bg3:#334155;
  --txt:#f1f5f9; --txt2:#94a3b8; --txt3:#64748b;
  --bdr:rgba(255,255,255,.08);
  --p:#3b82f6; --pd:#2563eb; --ok:#22c55e; --err:#ef4444; --warn:#f59e0b; --pur:#a78bfa;
  --bubble-me:linear-gradient(135deg,#3b82f6,#2563eb);
  --bubble-them:#263044;
  --bubble-them-txt:#f1f5f9;
  --r:20px; --rs:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body.light {
  --bg0:#f0f4ff; --bg1:#ffffff; --bg2:#f8faff; --bg3:#e8eef8;
  --txt:#0f172a; --txt2:#475569; --txt3:#94a3b8;
  --bdr:rgba(0,0,0,.08);
  --bubble-them:#e8eef8; --bubble-them-txt:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;background:var(--bg0);color:var(--txt)}
/* ════ מסכים ════ */
.screen{display:none;position:fixed;inset:0;flex-direction:column}
.screen.active{display:flex}
/* ════ LOGIN ════ */
#s-login{background:linear-gradient(145deg,#0f172a,#1a2640);align-items:center;justify-content:center;padding:24px}
.login-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:40px 28px;width:100%;max-width:380px;text-align:center;animation:fu .5s cubic-bezier(.34,1.1,.64,1) both}
@keyframes fu{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--p),var(--pd));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 12px 32px rgba(59,130,246,.4)}
.login-title{color:#fff;font-size:22px;font-weight:800;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.45);font-size:14px;margin-bottom:32px}
.lf{margin-bottom:16px;text-align:right}
.ll{font-size:13px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:7px;display:block}
.li{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--rs);color:#fff;font-family:'Heebo',sans-serif;font-size:15px;padding:13px 14px;outline:none;transition:all .2s}
.li:focus{border-color:var(--p);background:rgba(255,255,255,.12)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--p),var(--pd));border:none;border-radius:var(--rs);color:#fff;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;padding:15px;cursor:pointer;margin-top:8px;box-shadow:0 8px 24px rgba(59,130,246,.4)}
.lerr{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--rs);color:#fca5a5;font-size:13px;padding:10px 14px;margin-top:12px;display:none;text-align:center}
.lerr.show{display:block}
/* ════ LIST ════ */
#s-list{background:var(--bg0)}
.topbar{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;flex:1}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:none;color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.icon-btn:active{background:var(--bg3)}
.search-wrap{padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-inp{width:100%;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:22px;color:var(--txt);font-family:'Heebo',sans-serif;font-size:14px;padding:10px 16px 10px 40px;outline:none;transition:border-color .2s;direction:rtl}
.search-inp:focus{border-color:var(--p)}
.search-ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.search-wrap{position:relative}
.conv-list{flex:1;overflow-y:auto;overscroll-behavior:contain}
.conv-list::-webkit-scrollbar{display:none}
/* פריט שיחה */
.conv-item{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s;position:relative;user-select:none}
.conv-item:active{background:var(--bg2)}
.conv-item.unread .ci-name{font-weight:800}
.conv-item.archived{opacity:.5}
.conv-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0;position:relative}
.avatar-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--ok);border:2px solid var(--bg1)}
.ci-info{flex:1;min-width:0}
.ci-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ci-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:12px;color:var(--txt3);flex-shrink:0}
.ci-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ci-preview{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ci-badges{display:flex;align-items:center;gap:5px;flex-shrink:0}
.unread-dot{width:20px;height:20px;border-radius:50%;background:var(--p);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.star-ico{color:var(--warn);font-size:14px}
/* swipe */
.conv-item-wrap{position:relative;overflow:hidden}
.conv-swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding:0 20px;gap:8px}
.conv-swipe-bg.left{justify-content:flex-start;background:linear-gradient(90deg,var(--ok),transparent)}
.conv-swipe-bg.right{justify-content:flex-end;background:linear-gradient(270deg,var(--bg3),transparent)}
.swipe-lbl{font-size:12px;font-weight:700;color:#fff}
/* empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center;color:var(--txt3)}
.empty-icon{width:72px;height:72px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.empty-title{font-size:18px;font-weight:700;color:var(--txt)}
.empty-sub{font-size:14px;line-height:1.6}
/* ════ CHAT ════ */
#s-chat{background:var(--bg0)}
.chat-topbar{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:calc(var(--safe-top) + 10px) 12px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.chat-avatar-sm{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;position:relative}
.chat-avatar-sm .avatar-online{width:10px;height:10px}
.chat-header-info{flex:1;min-width:0}
.chat-header-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header-status{font-size:12px;color:var(--txt2)}
.chat-header-actions{display:flex;gap:4px}
/* הודעות */
.msgs-container{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:2px;overscroll-behavior:contain}
.msgs-container::-webkit-scrollbar{display:none}
/* date divider */
.date-div{text-align:center;margin:12px 0;position:relative}
.date-div::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--bdr)}
.date-div span{background:var(--bg0);padding:0 12px;position:relative;font-size:12px;color:var(--txt3)}
/* bubble */
.msg-row{display:flex;flex-direction:column;margin:1px 0}
.msg-row.me{align-items:flex-start}
.msg-row.them{align-items:flex-end}
.msg-bubble-wrap{max-width:80%;position:relative;display:flex;flex-direction:column}
.msg-row.me .msg-bubble-wrap{align-items:flex-start}
.msg-row.them .msg-bubble-wrap{align-items:flex-end}
.reply-preview{background:rgba(59,130,246,.12);border-right:3px solid var(--p);border-radius:8px;padding:6px 10px;margin-bottom:4px;font-size:12px;color:var(--txt2);max-width:100%;overflow:hidden}
.reply-preview-name{font-weight:700;color:var(--p);margin-bottom:2px;font-size:11px}
.reply-preview-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-bubble{padding:9px 13px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;position:relative;cursor:pointer;user-select:none;transition:opacity .15s}
.msg-bubble:active{opacity:.8}
.msg-row.me .msg-bubble{background:var(--bubble-me);color:#fff;border-bottom-right-radius:5px}
.msg-row.them .msg-bubble{background:var(--bubble-them);color:var(--bubble-them-txt);border-bottom-left-radius:5px}
.msg-deleted{font-style:italic;opacity:.6;font-size:13px}
.msg-edited{font-size:11px;opacity:.6;margin-right:4px}
/* מטא הודעה */
.msg-meta{display:flex;align-items:center;gap:4px;margin-top:3px;padding:0 2px}
.msg-row.me .msg-meta{flex-direction:row}
.msg-row.them .msg-meta{flex-direction:row-reverse}
.msg-time{font-size:11px;color:var(--txt3)}
.msg-status{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:2px}
.msg-status.seen{color:var(--p)}
/* emoji reactions */
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.reaction-chip{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:2px 7px;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px}
.reaction-chip:hover,.reaction-chip.mine{background:rgba(59,130,246,.15);border-color:var(--p)}
.reaction-count{font-size:11px;color:var(--txt2);font-weight:600}
/* typing */
.typing-row{display:flex;flex-direction:column;align-items:flex-end;margin:4px 0;display:none}
.typing-row.show{display:flex}
.typing-bubble{background:var(--bubble-them);border-radius:18px;border-bottom-left-radius:5px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:tdot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.typing-lbl{font-size:11px;color:var(--txt3);margin-top:3px;padding:0 4px}
/* reply bar */
.reply-bar{background:var(--bg2);border-top:1px solid var(--bdr);padding:10px 14px;display:none;align-items:center;gap:10px;flex-shrink:0}
.reply-bar.show{display:flex}
.reply-bar-content{flex:1;min-width:0}
.reply-bar-name{font-size:12px;font-weight:700;color:var(--p)}
.reply-bar-text{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* input */
.chat-input-area{background:var(--bg1);border-top:1px solid var(--bdr);padding:10px 12px;padding-bottom:calc(10px + var(--safe-bot));flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px}
.chat-ta{flex:1;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:22px;color:var(--txt);font-family:'Heebo',sans-serif;font-size:15px;padding:10px 16px;min-height:44px;max-height:120px;resize:none;outline:none;line-height:1.5;overflow-y:auto;transition:border-color .2s}
.chat-ta:focus{border-color:var(--p)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;box-shadow:0 4px 14px rgba(59,130,246,.4);transition:transform .15s}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
/* quick replies */
.quick-replies{padding:8px 12px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;border-top:1px solid var(--bdr)}
.quick-replies::-webkit-scrollbar{display:none}
.qr-chip{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:20px;color:var(--txt2);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .2s}
.qr-chip:active{background:var(--p);border-color:var(--p);color:#fff}
/* ════ CONTEXT MENU ════ */
.ctx-overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.ctx-overlay.show{display:flex;align-items:flex-end;justify-content:center;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ls-circle .ls-c{stroke:#22c55e;stroke-width:2.5;stroke-dasharray:151;stroke-dashoffset:151;animation:lsCirc .5s ease forwards}
.ls-circle .ls-p{stroke:#22c55e;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:48;stroke-dashoffset:48;animation:lsCheck .35s .45s ease forwards}
@keyframes lsCirc{to{stroke-dashoffset:0}}
@keyframes lsCheck{to{stroke-dashoffset:0}}
.ctx-bubble-preview{background:var(--bubble-me);color:#fff;border-radius:18px;padding:10px 14px;max-width:80%;margin-bottom:12px;font-size:14px;line-height:1.5;animation:fu .2s ease}
.ctx-bubble-preview.them{background:var(--bubble-them);color:var(--bubble-them-txt)}
/* emoji row */
.emoji-row{display:flex;gap:6px;background:var(--bg1);border-radius:40px;padding:8px 14px;margin-bottom:10px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fu .2s cubic-bezier(.34,1.2,.64,1)}
.emoji-btn{font-size:26px;cursor:pointer;border:none;background:none;padding:4px;border-radius:50%;transition:transform .15s}
.emoji-btn:active{transform:scale(1.3)}
/* action sheet */
.action-sheet{background:var(--bg1);border-radius:24px 24px 0 0;padding:8px 0 calc(20px + var(--safe-bot));width:100%;max-width:480px;animation:su .3s cubic-bezier(.34,1.1,.64,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.as-handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 16px}
.as-item{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;transition:background .15s;font-size:15px;font-weight:500}
.as-item:active{background:var(--bg2)}
.as-item.danger{color:var(--err)}
.as-item svg{flex-shrink:0}
.as-sep{height:1px;background:var(--bdr);margin:4px 0}
/* ════ PROFILE SHEET ════ */
.profile-sheet{background:var(--bg1);border-radius:24px 24px 0 0;padding:0 0 calc(24px + var(--safe-bot));width:100%;max-width:480px;animation:su .3s cubic-bezier(.34,1.1,.64,1);max-height:85vh;overflow-y:auto}
.profile-header{background:linear-gradient(135deg,var(--p),var(--pd));padding:40px 24px 28px;text-align:center;position:relative}
.profile-avatar-lg{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 14px;border:3px solid rgba(255,255,255,.3)}
.profile-name{color:#fff;font-size:20px;font-weight:800;margin-bottom:4px}
.profile-phone{color:rgba(255,255,255,.7);font-size:14px;direction:ltr}
.profile-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.profile-body{padding:20px 20px 0}
.profile-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bdr)}
.profile-row:last-child{border-bottom:none}
.profile-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-label{font-size:12px;color:var(--txt3);margin-bottom:2px}
.profile-value{font-size:14px;font-weight:600}
/* פאנלים: מועדפים + מדיה (#6) */
.panel-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg1);z-index:2}
.panel-title{font-size:17px;font-weight:800}
.panel-body{padding:14px 16px;max-height:72vh;overflow-y:auto}
.panel-empty{text-align:center;color:var(--txt3);font-size:14px;padding:48px 20px}
.star-msg-card{background:var(--bg2);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.star-msg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.star-msg-who{font-size:12px;font-weight:700;color:var(--p)}
.star-msg-time{font-size:11px;color:var(--txt3)}
.star-msg-text{font-size:14px;color:var(--txt);line-height:1.5;word-break:break-word}
.star-msg-img{max-width:160px;max-height:160px;border-radius:10px;margin-top:4px;display:block;cursor:pointer;object-fit:cover}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.media-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--bg2)}
.media-cell img{width:100%;height:100%;object-fit:cover;display:block}
.media-cell .media-meta{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.72));color:#fff;font-size:9px;padding:8px 5px 4px;line-height:1.3}
/* ════ SHEET (general) ════ */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.sheet-overlay.show{display:flex;animation:fi .15s ease}
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:var(--warn);color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;text-align:center;z-index:9999}
.offline-banner.show{display:block}
/* ════ TOAST ════ */
#toast-wrap{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#1e293b;color:#fff;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;animation:tin .25s ease both;border-right:3px solid var(--p)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* ════ MISC ════ */
.badge-dot{width:8px;height:8px;border-radius:50%;background:var(--p);display:inline-block}
.starred{color:var(--warn)!important}
/* no select on bubbles */
.msg-bubble{-webkit-user-select:none;user-select:none}
/* swipe animation */
.conv-item{transform:translateX(0);transition:transform .2s ease}
/* אינדיקציית swipe-to-reply על בועה (#4) */
.msg-row{position:relative}
.msg-row .msg-bubble{will-change:transform}
.msg-row.swiping-reply .msg-bubble{box-shadow:0 0 0 2px var(--p,#3b82f6)}

    .rating-overlay{display:none;position:fixed;inset:0;background:rgba(12,26,46,.8);backdrop-filter:blur(6px);z-index:900;align-items:flex-end;justify-content:center}
    .rating-overlay.show{display:flex;animation:fadeIn .2s ease}
    .rating-sheet{background:var(--bg1);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:12px 28px calc(40px + var(--safe-bot));text-align:center}
    .rating-stars{display:flex;gap:12px;justify-content:center;margin:20px 0}
    .rating-star{font-size:36px;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4}
    .rating-star.active{filter:none;opacity:1;transform:scale(1.15)}

  function spinnerSVG(){
    /* קשת מסתובבת בסגנון Google (SVG, לא אמוji) */
    return `<svg class="img-gspin" width="34" height="34" viewBox="0 0 50 50"><circle class="img-gspin-track" cx="25" cy="25" r="20" fill="none" stroke-width="5"/><circle class="img-gspin-arc" cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke-linecap="round"/></svg>`;
  }

  function setState(el, state, opts={}){
    el.dataset.state = state;
    const url = el.dataset.url;
    if (state === "loading"){
      el.innerHTML = `<div class="img-sk-inner">${spinnerSVG()}<div class="img-sk-txt" style="display:none"></div></div>`;
    } else if (state === "slow"){
      const t = el.querySelector(".img-sk-txt");
      if (t){ t.textContent = "החיבור לאינטרנט איטי מהרגיל. מנסים לטעון את התמונה…"; t.style.display="block"; }
    } else if (state === "offline"){
      el.innerHTML = `<div class="img-sk-inner"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity=".7"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg><div class="img-sk-txt" style="display:block">אין חיבור לאינטרנט. הטעינה תימשך כשהחיבור יחזור.</div></div>`;
    } else if (state === "failed"){
      el.innerHTML = `<div class="img-sk-inner"><div class="img-sk-txt" style="display:block;margin-bottom:8px">לא הצלחנו להוריד את התמונה עקב חיבור אינטרנט חלש. מומלץ לעבור לאזור עם קליטה חזקה יותר ולנסות שוב.</div><button class="img-sk-retry" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>נסה שוב</button></div>`;
      const btn = el.querySelector(".img-sk-retry");
      if (btn) btn.addEventListener("click", e=>{ e.stopPropagation(); start(el, true); });
    }
  }

  function clearTimers(st){
    if (st.slowT) clearTimeout(st.slowT);
    if (st.toT)   clearTimeout(st.toT);
    if (st.backoffT) clearTimeout(st.backoffT);
    st.slowT = st.toT = st.backoffT = null;
  }

  function succeed(el, url){
    const st = active.get(el); if (st) clearTimers(st);
    active.delete(el);
    /* החלפה חלקה ל-img האמיתי עם fade */
    const img = document.createElement("img");
    img.className = "msg-img img-fade-in";
    img.src = url;
    img.alt = "תמונה";
    img.dataset.url = url;
    el.replaceWith(img);
    requestAnimationFrame(()=> img.classList.add("img-fade-show"));
  }

  function start(el, isManual){
    if (!el.dataset.url) return;
    const url = el.dataset.url;

    /* אופליין — לא לטעון, להמתין לחזרת רשת */
    if (!navigator.onLine){
      setState(el, "offline");
      active.set(el, { tries:0, waiting:"online" });
      return;
    }

    let st = active.get(el) || { tries:0 };
    if (isManual) st.tries = 0;
    active.set(el, st);
    setState(el, "loading");

    const probe = new Image();
    st.probe = probe;

    st.slowT = setTimeout(()=>{ if (el.dataset.state==="loading") setState(el,"slow"); }, SLOW_MS);

    const onDone = ok => {
      clearTimers(st);
      probe.onload = probe.onerror = null;
      if (ok){ succeed(el, url); return; }
      /* כשל — retry עם backoff, עד MAX_TRIES */
      st.tries++;
      if (st.tries >= MAX_TRIES){
        setState(el, "failed"); /* מצב ידני: כפתור "נסה שוב" */
        return;
      }
      const wait = BACKOFFS[st.tries-1] || 10000;
      st.backoffT = setTimeout(()=>{ if (navigator.onLine) start(el,false); else { setState(el,"offline"); st.waiting="online"; } }, wait);
    };

    st.toT = setTimeout(()=>{ probe.src=""; onDone(false); }, TIMEOUT_MS); /* תקיעה = כשל */
    probe.onload  = ()=> onDone(true);
    probe.onerror = ()=> onDone(false);
    probe.src = url;
  }

  /* חזרת רשת — לחדש כל מי שממתין */
  window.addEventListener("online", ()=>{
    active.forEach((st, el)=>{ if (st.waiting==="online"){ st.waiting=null; start(el,false); } });
  });
  window.addEventListener("offline", ()=>{
    active.forEach((st, el)=>{ clearTimers(st); if (el.dataset && el.dataset.state!=="failed"){ setState(el,"offline"); st.waiting="online"; } });
  });

  /* API ציבורי — לקרוא אחרי כל רינדור הודעות */
  window.initImageLoaders = function(root){
    const scope = root || document;
    scope.querySelectorAll(".img-skeleton:not([data-init])").forEach(el=>{
      el.dataset.init = "1";
      start(el, false);
    });
  };

  /* בונה HTML של skeleton — לשימוש ברינדור (במקום <img> ישיר) */
  window.imgSkeletonHTML = function(url, caption){
    const cap = caption ? `<div class="img-cap">${caption}</div>` : "";
    return `<div class="img-skeleton" data-url="${url}"></div>${cap}`;
  };
})();

/* ── כניסה ── */
function doLogin() {

  if (u === ADMIN_USER && p === ADMIN_PASS) {

  ov.style.display = "flex";

function doLogout() { localStorage.removeItem(SESSION_KEY); location.reload(); }
function checkSession() {
  try {

    return s && s.ok && Date.now() < s.expiry;

}

/* ── רשימת שיחות ── */
function showList() {
  showScreen("s-list");
  onValue(ref(db, "clients"), snap => {
    allClients = snap.val() || {};
    renderConvList();
  });
}

function renderConvList() {
  const container = document.getElementById("conv-list");
  let entries = Object.entries(allClients);
  /* #27 — סינון לפי ארכיון */
  entries = entries.filter(([, c]) => showArchived ? c.archived === true : c.archived !== true);
  if (searchQ) entries = entries.filter(([, c]) => (c.name || "").toLowerCase().includes(searchQ));

  /* בניית רשימה עם זמן הודעה אחרונה */
  const items = entries.map(([phone, c]) => {
    const msgs = c.messages ? Object.values(c.messages).filter(m => m.type !== "closed") : [];
    const lastMsg = msgs.sort((a, b) => b.at - a.at)[0];
    const unread = msgs.filter(m => (m.sender === "client" || !m.sender) && !m.agentRead).length;
    const isOnline = c.presence?.online || false;
    const starred = c.starred || false;
    return { phone, c, lastMsg, unread, isOnline, starred, lastAt: lastMsg?.at || c.joinedAt || 0 };
  }).sort((a, b) => b.lastAt - a.lastAt);

  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-title">${showArchived ? "הארכיון ריק" : "אין שיחות עדיין"}</div><div class="empty-sub">${showArchived ? "שיחות שתעביר לארכיון יופיעו כאן" : "הלקוחות יופיעו כאן כשישלחו הודעה"}</div></div>`;
    return;
  }

  container.innerHTML = items.map(({ phone, c, lastMsg, unread, isOnline, starred }) => {
    const initials = c.avatar
      ? `<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block" onerror="this.style.display='none'" />`
      : (c.name || "?")[0];
    const preview = lastMsg ? (lastMsg.deleted ? "ההודעה נמחקה" : lastMsg.text?.slice(0, 40) || "") : "אין הודעות";
    const senderPrefix = lastMsg?.sender === "agent" ? "אתה: " : "";
    const timeStr = lastMsg?.at ? fmtTime(lastMsg.at) : "";
    return `<div class="conv-item-wrap" data-phone="${phone}">
      <div class="conv-item ${unread > 0 ? "unread" : ""}" data-phone="${phone}">
        <div class="conv-avatar">
          ${initials}
          ${isOnline ? `<div class="avatar-online"></div>` : ""}
        </div>
        <div class="ci-info">
          <div class="ci-top">
            <div class="ci-name">${c.name || phone}</div>
            <div class="ci-time">${timeStr}</div>
          </div>
          <div class="ci-bottom">
            <div class="ci-preview">${senderPrefix}${preview}</div>
            <div class="ci-badges">
              ${starred ? `<span class="star-ico">⭐</span>` : ""}
              ${unread > 0 ? `<div class="unread-dot">${unread}</div>` : ""}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");

  /* אירועי לחיצה ו-swipe */
  container.querySelectorAll(".conv-item").forEach(item => {
    item.onclick = () => openChat(item.dataset.phone);
    /* swipe */
    item.addEventListener("touchstart", e => { swipeStartX = e.touches[0].clientX; swipeEl = item; }, { passive: true });
    item.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - swipeStartX;
      if (Math.abs(dx) > 60) dx > 0 ? markReadSwipe(item.dataset.phone) : archiveSwipe(item.dataset.phone);
      item.style.transform = "";
    }, { passive: true });
  });
}

function markReadSwipe(phone) {
  const c = allClients[phone]; if (!c?.messages) return;
  Object.entries(c.messages).forEach(([key, m]) => {
    if ((m.sender === "client" || !m.sender) && !m.agentRead) set(ref(db, `clients/${phone}/messages/${key}/agentRead`), true);
  });
  toast("סומן כנקרא");
}
function archiveSwipe(phone) {
  if (showArchived) {
    set(ref(db, `clients/${phone}/archived`), false); toast("הוחזר מהארכיון");
  } else {
    set(ref(db, `clients/${phone}/archived`), true); toast("הועבר לארכיון");
  }
}

/* ── פתיחת צ'אט ── */
function openChat(phone) {
  curPhone = phone;
  const c = allClients[phone] || {};
  document.getElementById("chat-name").textContent = c.name || phone;
  /* אווטר — אם יש תמונה מ-DiceBear */
  const avatarEl = document.getElementById("chat-avatar");
  if (c.avatar) {
    avatarEl.innerHTML = `<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none'" />`;
    avatarEl.style.padding = "0";
  } else {
    avatarEl.innerHTML = (c.name || "?")[0];
    avatarEl.style.padding = "";
  }
  curStarred = c.starred || false;
  updateStarIcon();

  /* האזנה להודעות */
  if (curListener) { curListener(); curListener = null; }
  if (typingListener) { typingListener(); typingListener = null; }
  if (presenceListener) { presenceListener(); presenceListener = null; }

  curListener = onValue(ref(db, `clients/${phone}/messages`), snap => renderMsgs(snap.val() || {}));

  /* סימון כנקרא — רק עכשיו, כשהמשתמש פתח את הצ'אט בפועל (#7) */
  (async () => {
    try {
      const snap = await get(ref(db, `clients/${phone}/messages`));
      const all = snap.val() || {};
      Object.entries(all).forEach(([key, m]) => {
        if ((m.sender === "client" || !m.sender) && !m.agentRead) {
          set(ref(db, `clients/${phone}/messages/${key}/agentRead`), true);
        }
      });
    } catch (e) { console.error(e); }
  })();

  /* האזנה לטקסט שהלקוח מקליד */
  typingListener = onValue(ref(db, `clients/${phone}/typing`), snap => {
    const data = snap.val();
    const row = document.getElementById("typing-row");
    const container = document.getElementById("msgs-container");
    if (data?.active && data?.text) {
      row.classList.add("show");
      row.querySelector(".typing-lbl").textContent = `מקליד: "${data.text.slice(0, 30)}${data.text.length > 30 ? "..." : ""}"`;
    } else if (data?.active) {
      row.classList.add("show");
      row.querySelector(".typing-lbl").textContent = "מקליד...";
    } else {
      row.classList.remove("show");
    }
    /* גלילה אוטומטית כשמקלידים */
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 30);
  });

  /* האזנה לנוכחות */
  presenceListener = onValue(ref(db, `clients/${phone}/presence`), snap => {
    const p = snap.val();
    const statusEl = document.getElementById("chat-status");
    if (p?.online && p?.chatOpen) {
      statusEl.textContent = "מחובר לצ'אט";
      statusEl.style.color = "var(--ok)";
    } else if (p?.online) {
      statusEl.textContent = "מחובר לאתר";
      statusEl.style.color = "var(--ok)";
    } else if (p?.lastSeen) {
      statusEl.textContent = `נראה לאחרונה ${fmtSeen(p.lastSeen)}`;
      statusEl.style.color = "var(--txt3)";
    } else {
      statusEl.textContent = "אופליין";
      statusEl.style.color = "var(--txt3)";
    }
  });

  showScreen("s-chat");
  document.getElementById("chat-ta").focus();
  /* גלילה לתחתית בפתיחה */
  setTimeout(() => {
    const c = document.getElementById("msgs-container");
    c.scrollTop = c.scrollHeight;
  }, 100);
}

/* ── רינדור הודעות ── */
function renderMsgs(msgs) {
  const container = document.getElementById("msgs-container");
  const typingRow  = document.getElementById("typing-row");
  container.querySelectorAll(".msg-row,.date-div").forEach(el => el.remove());

  const entries = Object.entries(msgs).filter(([, m]) => m.type !== "closed" && !m.hiddenForAgent);
  entries.sort(([, a], [, b]) => a.at - b.at);

  /* #2 — באנר 'נפתחה על ידי' */
  container.querySelector(".opened-by-ban")?.remove();
  const ob = allClients?.[curPhone]?.openedBy;
  if (ob && ob.role) {
    const who = ob.role === "client" ? (allClients?.[curPhone]?.name || "הלקוח") : (ob.name || (ob.role === "admin" ? "המנהל" : "נציג"));
    const b = document.createElement("div");
    b.className = "opened-by-ban";
    b.style.cssText = "text-align:center;font-size:11px;color:var(--txt3);background:var(--bg2);border-radius:8px;padding:5px 10px;margin:6px auto;max-width:80%";
    b.textContent = `השיחה נפתחה על ידי ${who}`;
    container.insertBefore(b, typingRow);
  }

  let lastDate = "";
  entries.forEach(([key, m]) => {
    const dateStr = new Date(m.at).toLocaleDateString("he-IL");
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      const div = document.createElement("div"); div.className = "date-div";
      div.innerHTML = `<span>${dateStr}</span>`;
      container.insertBefore(div, typingRow);
    }

    const isAgent = m.sender === "agent";
    const row = document.createElement("div");
    row.className = `msg-row ${isAgent ? "me" : "them"}`;
    row.dataset.key = key;

    /* reply preview */
    let replyHtml = "";
    if (m.replyTo) {
      replyHtml = `<div class="reply-preview" style="display:flex;align-items:center;gap:8px">${m.replyTo.type === "image" && m.replyTo.imageUrl ? `<img src="${m.replyTo.imageUrl}" style="width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0" alt=""/>` : ""}<div style="min-width:0;flex:1"><div class="reply-preview-name">${m.replyTo.sender === "agent" ? "אתה" : "לקוח"}</div><div class="reply-preview-text">${m.replyTo.type === "image" ? (m.replyTo.text || "תמונה") : m.replyTo.text}</div></div></div>`;
    }

    /* bubble */
    const bubbleText = m.deleted
      ? `<span class="msg-deleted">🚫 ${m.type === "image" ? "התמונה נמחקה" : "ההודעה נמחקה"}</span>`
      : (m.type === "image" && (m.imageUrl || (m.oneTime && m.viewed)))
        ? (() => {
            const mineImg = isAgent;
            if (m.oneTime && !mineImg && m.viewed) return `<span class="ot-opened">נפתחה</span>`;
            if (m.oneTime && !mineImg && !m.viewed) return `<span class="ot-receive"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="16" font-size="11" font-weight="bold" text-anchor="middle" fill="currentColor" stroke="none">1</text></svg> תמונה חד-פעמית · הקש לצפייה</span>`;
            if (m.oneTime && mineImg) return `<span class="ot-sent"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="currentColor" stroke="none">1</text></svg> ${m.viewed ? "נצפתה" : "תמונה חד-פעמית"}</span>`;
            return window.imgSkeletonHTML(m.imageUrl, m.text || "");
          })()
        : `${m.text}${m.edited ? `<span class="msg-edited">(נערך)</span>` : ""}`;

    /* status */
    let statusHtml = "";
    if (isAgent && !m.deleted) {
      if (m.clientRead) {
        statusHtml = `<span class="msg-status seen" title="נקרא ${m.clientReadAt ? fmtDate(m.clientReadAt) : ""}">
          <svg width="18" height="11" viewBox="0 0 18 11" fill="none">
            <path d="M1 5.5l3.5 3.5L11 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 5.5l3.5 3.5L16 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ${m.clientReadAt ? fmtDate(m.clientReadAt) : ""}
        </span>`;
      } else {
        statusHtml = `<span class="msg-status">
          <svg width="12" height="11" viewBox="0 0 12 11" fill="none">
            <path d="M1 5.5l3.5 3.5L11 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>`;
      }
    }

    /* reactions */
    const reactions = m.reactions || {};
    const reactionGroups = {};
    Object.entries(reactions).forEach(([, r]) => {
      if (!reactionGroups[r.emoji]) reactionGroups[r.emoji] = { count: 0, byMe: false };
      reactionGroups[r.emoji].count++;
      if (r.by === "agent") reactionGroups[r.emoji].byMe = true;
    });
    const reactionsHtml = Object.entries(reactionGroups).length
      ? `<div class="msg-reactions">${Object.entries(reactionGroups).map(([emoji, d]) =>
          `<div class="reaction-chip ${d.byMe ? "mine" : ""}" onclick="toggleReaction('${key}','${emoji}')">${emoji}<span class="reaction-count">${d.count > 1 ? d.count : ""}</span></div>`
        ).join("")}</div>`
      : "";

    /* starred */
    const starHtml = (m.starredBy && m.starredBy["agent"]) ? `<span style="font-size:12px;margin-right:4px">⭐</span>` : "";

    /* #13 — שם הכותב (במיוחד אם הוחלף נציג) */
    const myName = (typeof currentUser!=="undefined"&&currentUser?.name) || ADMIN_USER;
    const authorHtml = (isAgent && m.agentName && m.agentName !== myName)
      ? `<span style="font-size:10px;font-weight:700;color:var(--p);margin-left:4px">${m.agentName}</span>` : "";

    row.innerHTML = `
      <div class="msg-bubble-wrap">
        ${replyHtml}
        <div class="msg-bubble ${m.deleted ? "msg-deleted" : ""}" data-key="${key}">${bubbleText}</div>
        ${reactionsHtml}
        <div class="msg-meta">
          ${authorHtml}
          ${starHtml}
          <span class="msg-time">${fmtTime(m.at)}</span>
          ${statusHtml}
        </div>
      </div>`;

    /* לחיצה על bubble */
    const bubEl = row.querySelector(".msg-bubble");
    const isViewedOneTime = m.type === "image" && m.oneTime && m.viewed;
    const isImgM = m.type === "image" && m.imageUrl && !m.deleted && !isViewedOneTime;
    if (isViewedOneTime) {
      /* תמונה חד-פעמית שנצפתה — read-only, ללא פעולות הודעה (#9) */
    } else if (isImgM) {
      let lpt = null, lpf = false;
      const sLP = () => { lpf = false; lpt = setTimeout(() => { lpf = true; openCtx(key, m, isAgent); }, 500); };
      const cLP = () => { if (lpt) clearTimeout(lpt); };
      bubEl.addEventListener("click", e => { if (lpf) { e.preventDefault(); return; } if (m.oneTime) openOneTimeImg(key, m, isAgent); else openLightbox(m.imageUrl); });
      bubEl.addEventListener("contextmenu", e => { e.preventDefault(); openCtx(key, m, isAgent); });
      bubEl.addEventListener("touchstart", sLP, { passive: true });
      bubEl.addEventListener("touchend", cLP);
      bubEl.addEventListener("touchmove", cLP);
    } else {
      bubEl.addEventListener("click", () => { if (!m.deleted) openCtx(key, m, isAgent); });
    }

    /* swipe לתגובה (#4) — נשלח (me) גורר שמאלה, התקבל (them) גורר ימינה */
    (function(){
      const bub = row.querySelector(".msg-bubble") || row;
      const mine = isAgent; /* הודעה שלי = נציג */
      let sx=0, sy=0, dragging=false, decided=false, active=false, curDx=0;
      const TH=55; /* סף הפעלה */
      row.addEventListener("touchstart", e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=true; decided=false; active=false; curDx=0; }, {passive:true});
      row.addEventListener("touchmove", e=>{
        if(!dragging) return;
        const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
        if(!decided){
          if(Math.abs(dx)<6 && Math.abs(dy)<6) return;
          /* אם התנועה אנכית בעיקר — גלילה, לא swipe */
          if(Math.abs(dy)>Math.abs(dx)){ dragging=false; return; }
          /* כיוון תקין בלבד */
          if(mine && dx>0){ dragging=false; return; }      /* שלי: רק שמאלה */
          if(!mine && dx<0){ dragging=false; return; }      /* שלהם: רק ימינה */
          decided=true; active=true;
        }
        if(!active) return;
        curDx=Math.max(-90,Math.min(90,dx));
        bub.style.transition="none";
        bub.style.transform=`translateX(${curDx*0.6}px)`;
        bub.style.opacity = String(1-Math.min(Math.abs(curDx)/220,0.25));
        row.classList.toggle("swiping-reply", Math.abs(curDx)>=TH);
      }, {passive:true});
      const endSwipe=()=>{
        if(!dragging && !active){ return; }
        dragging=false;
        if(active){
          bub.style.transition="transform .2s ease, opacity .2s ease";
          bub.style.transform=""; bub.style.opacity="";
          row.classList.remove("swiping-reply");
          if(Math.abs(curDx)>=TH) setReply(key, m);
        }
        active=false;
      };
      row.addEventListener("touchend", endSwipe, {passive:true});
      row.addEventListener("touchcancel", endSwipe, {passive:true});
    })();

    container.insertBefore(row, typingRow);
  });
  /* הערה: סימון כנקרא הועבר ל-openChat בלבד (#7) — לא מסמנים פר-רינדור,
     כדי שמונה ההודעות שלא נקראו לא יתאפס בקבלת הודעה/רענון/סנכרון */

  if (window.initImageLoaders) window.initImageLoaders(container);
  /* גלילה מיידית לתחתית */
  container.scrollTop = container.scrollHeight;
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 60);
}

/* ── שליחת הודעה ── */
async function sendMsg() {
  const text = document.getElementById("chat-ta").value.trim();
  if (!text || !curPhone) return;
  const btn = document.getElementById("send-btn"); btn.disabled = true;
  try {
    const key = `msg_${Date.now()}`;
    const msg = { text, at: Date.now(), sender: "agent", agentRead: true, clientRead: false, agentName: (typeof currentUser!=="undefined"&&currentUser?.name) || ADMIN_USER || "נציג" };
    if (replyTo) { msg.replyTo = buildReplyMeta(replyTo); cancelReply(); }
    await set(ref(db, `clients/${curPhone}/messages/${key}`), msg);
    /* #2 — סימון מי פתח (אם אין עדיין) */
    try{const ob=await get(ref(db,`clients/${curPhone}/openedBy`));if(!ob.exists())await set(ref(db,`clients/${curPhone}/openedBy`),{role:"agent",name:(typeof currentUser!=="undefined"&&currentUser?.name)||ADMIN_USER||"נציג",at:Date.now()});}catch(_){}
    document.getElementById("chat-ta").value = "";
    document.getElementById("chat-ta").style.height = "";
    sendTyping(false);
  } catch (e) { toast("שגיאה בשליחה"); } finally { btn.disabled = false; }
}

/* ── typing indicator ── */
async function sendTyping(active) {
  if (!curPhone) return;
  const text = active ? document.getElementById("chat-ta").value : "";
  await set(ref(db, `clients/${curPhone}/agentTyping`), { active, text, at: Date.now() });
}

/* ── context menu ── */
function openCtx(key, msg, isAgent) {
  ctxMsgKey = key; ctxMsgData = msg;
  const preview = document.getElementById("ctx-preview");
  preview.textContent = msg.type === "image" ? "📷 תמונה" : msg.text;
  preview.className = `ctx-bubble-preview ${isAgent ? "" : "them"}`;
  /* הצגת עריכה רק להודעות נציג טקסט שאינן ישנות מדי */
  const canEdit = isAgent && msg.type !== "image" && (Date.now() - msg.at) < EDIT_WINDOW_MS;
  document.getElementById("as-edit").style.display = canEdit ? "" : "none";
  document.getElementById("ctx-overlay").classList.add("show");
}
function closeCtx() { document.getElementById("ctx-overlay").classList.remove("show"); ctxMsgKey = null; ctxMsgData = null; }

/* ── פעולות על הודעה ── */
function setReply(key, msg) {
  replyTo = msg; replyTo.key = key;
  const bar = document.getElementById("reply-bar");
  document.getElementById("reply-bar-name").textContent = msg.sender === "agent" ? "אתה" : allClients[curPhone]?.name || "לקוח";
  /* תצוגה מקדימה: תמונה ממוזערת + טקסט (#reply לתמונה) */
  const thumb = document.getElementById("reply-bar-thumb");
  const isImg = msg.type === "image" && msg.imageUrl;
  if (isImg) {
    thumb.src = msg.imageUrl; thumb.style.display = "block";
    document.getElementById("reply-bar-text").textContent = msg.text ? msg.text.slice(0, 60) : "תמונה";
  } else {
    thumb.style.display = "none"; thumb.src = "";
    document.getElementById("reply-bar-text").textContent = (msg.text || "").slice(0, 60);
  }
  bar.classList.add("show");
  document.getElementById("chat-ta").focus();
}
function cancelReply() { replyTo = null; document.getElementById("reply-bar").classList.remove("show"); const t=document.getElementById("reply-bar-thumb"); if(t){t.style.display="none";t.src="";} }
/* בונה אובייקט reply עם תמונה ממוזערת אם רלוונטי (#reply לתמונה) */
function buildReplyMeta(r) {
  const meta = { sender: r.sender };
  if (r.type === "image" && r.imageUrl) { meta.type = "image"; meta.imageUrl = r.imageUrl; meta.text = r.text ? r.text.slice(0, 80) : ""; }
  else { meta.text = (r.text || "").slice(0, 80); }
  return meta;
}

function copyMsg(msg) { navigator.clipboard?.writeText(msg.text).then(() => toast("הועתק ✓")); }

async function addReaction(emoji) {
  if (!ctxMsgKey || !curPhone) return;
  await toggleReaction(ctxMsgKey, emoji);
  closeCtx();
}

async function toggleReaction(msgKey, emoji) {
  if (!curPhone || !msgKey) return;
  const snap = await get(ref(db, `clients/${curPhone}/messages/${msgKey}/reactions/r_agent`));
  if (snap.exists() && snap.val().emoji === emoji) {
    /* מסיר את ה-reaction */
    await remove(ref(db, `clients/${curPhone}/messages/${msgKey}/reactions/r_agent`));
    toast(`${emoji} הוסר`);
  } else {
    await set(ref(db, `clients/${curPhone}/messages/${msgKey}/reactions/r_agent`), { emoji, by: "agent", at: Date.now() });
    toast(`${emoji} נוסף`);
  }
}
window.toggleReaction = toggleReaction;

async function starMsg(key, msg) {
  /* כוכב פרטי (#5) — נשמר תחת starredBy/<צד>, כך שכל צד רואה רק את שלו */
  const me = "agent";
  const cur = !!(msg.starredBy && msg.starredBy[me]);
  await set(ref(db, `clients/${curPhone}/messages/${key}/starredBy/${me}`), cur ? null : true);
  toast(cur ? "הוסר מהמועדפים" : "⭐ נוסף למועדפים");
}

async function delMe(key) {
  await set(ref(db, `clients/${curPhone}/messages/${key}/hiddenForAgent`), true);
  toast("נמחק אצלך");
}
async function delAll(key) {
  await update(ref(db, `clients/${curPhone}/messages/${key}`), { deleted: true, text: "ההודעה נמחקה", deletedAt: Date.now() });
  toast("נמחק אצל כולם");
}

/* ── עריכה ── */
let editKey = null;
function openEdit(key, msg) {
  editKey = key;
  document.getElementById("edit-ta").value = msg.text;
  document.getElementById("edit-overlay").classList.add("show");
  document.getElementById("edit-ta").focus();
}
async function saveEdit() {
  const text = document.getElementById("edit-ta").value.trim();
  if (!text || !editKey || !curPhone) return;
  await update(ref(db, `clients/${curPhone}/messages/${editKey}`), { text, edited: true, editedAt: Date.now() });
  closeSheet("edit-overlay"); toast("הודעה עודכנה ✓");
}

/* ── כוכב לשיחה ── */
async function confirmDeleteChat() {
  if (!curPhone) return;
  const name = allClients[curPhone]?.name || curPhone;
  showConfirmSheet("מחיקת שיחה", `למחוק את כל השיחה עם ${name}? הפעולה תמחק מהשרת לצמיתות.`, async () => {
    try {
      await remove(ref(db, `clients/${curPhone}/messages`));
      toast("השיחה נמחקה מהשרת ✓");
    } catch(e) { toast("שגיאה במחיקה"); }
  });
}

async function toggleStarChat() {
  if (!curPhone) return;
  curStarred = !curStarred;
  await set(ref(db, `clients/${curPhone}/starred`), curStarred);
  updateStarIcon(); toast(curStarred ? "⭐ שיחה מסומנת" : "הכוכב הוסר");
}
function updateStarIcon() {
  const icon = document.getElementById("star-icon");
  if (curStarred) icon.setAttribute("fill", "var(--warn)");
  else icon.removeAttribute("fill");
}

/* ── פרופיל ── */
function openProfile() {
  if (!curPhone) return;
  const c = allClients[curPhone] || {};
  const paEl = document.getElementById("profile-avatar-lg");
  if (c.avatar) {
    paEl.innerHTML = `<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none'" />`;
    paEl.style.padding = "0";
    paEl.style.overflow = "hidden";
  } else {
    paEl.textContent = (c.name || "?")[0];
  }
  document.getElementById("profile-name-lg").textContent = c.name || "לא ידוע";
  document.getElementById("profile-phone-lg").textContent = fmtPhone(curPhone);
  const body = document.getElementById("profile-body");
  const msgs = c.messages ? Object.values(c.messages).filter(m => m.type !== "closed") : [];
  const sites = c.sites ? Object.values(c.sites) : [];
  body.innerHTML = `
    ${c.email ? `<div class="profile-row"><div class="profile-icon" style="background:rgba(59,130,246,.1);color:var(--p)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><div><div class="profile-label">אימייל</div><div class="profile-value">${c.email}</div></div></div>` : ""}
    <div class="profile-row"><div class="profile-icon" style="background:rgba(34,197,94,.1);color:var(--ok)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div><div class="profile-label">הודעות</div><div class="profile-value">${msgs.length}</div></div></div>
    <div class="profile-row"><div class="profile-icon" style="background:rgba(139,92,246,.1);color:var(--pur)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg></div><div><div class="profile-label">אתרים</div><div class="profile-value">${sites.length}</div></div></div>
    ${c.joinedAt ? `<div class="profile-row"><div class="profile-icon" style="background:rgba(245,158,11,.1);color:var(--warn)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="profile-label">הצטרף</div><div class="profile-value">${fmtDate(c.joinedAt)}</div></div></div>` : ""}
    ${c.note ? `<div class="profile-row"><div class="profile-icon" style="background:rgba(239,68,68,.1);color:var(--err)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></div><div><div class="profile-label">תזכורת</div><div class="profile-value">${c.note}</div></div></div>` : ""}
    <div class="profile-row" id="pf-starred" style="cursor:pointer"><div class="profile-icon" style="background:rgba(245,158,11,.12);color:var(--warn)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div style="flex:1"><div class="profile-label">מועדפים</div><div class="profile-value">הודעות שסימנת בכוכב</div></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="profile-row" id="pf-media" style="cursor:pointer"><div class="profile-icon" style="background:rgba(59,130,246,.12);color:var(--p)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div style="flex:1"><div class="profile-label">מדיה</div><div class="profile-value">כל התמונות בצ'אט</div></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
  `;
  document.getElementById("pf-starred").onclick = (e) => { e.stopPropagation(); openStarred(); };
  document.getElementById("pf-media").onclick = (e) => { e.stopPropagation(); openMedia(); };
  document.getElementById("profile-overlay").classList.add("show");
}

/* ── מועדפים: הודעות שהמשתמש הנוכחי (נציג) סימן בכוכב (#6) ── */
function openStarred() {
  const c = allClients[curPhone] || {};
  const body = document.getElementById("starred-body");
  const all = c.messages ? Object.entries(c.messages).filter(([, m]) => m.type !== "closed") : [];
  /* רק מה שאני (agent) סימנתי — פרטי לכל צד */
  const starred = all.filter(([, m]) => m.starredBy && m.starredBy["agent"]).sort((a, b) => (a[1].at || 0) - (b[1].at || 0));
  if (!starred.length) {
    body.innerHTML = `<div class="panel-empty">אין הודעות שסומנו בכוכב</div>`;
  } else {
    body.innerHTML = starred.map(([key, m]) => {
      const who = (m.sender === "agent") ? "אתה" : (c.name || "לקוח");
      const time = `${fmtDate(m.at)} · ${fmtTime(m.at)}`;
      let content;
      if (m.type === "image" && m.imageUrl) {
        content = `<img class="star-msg-img" src="${m.imageUrl}" onclick="window.openLightbox('${m.imageUrl}')" alt="תמונה"/>${m.text ? `<div class="star-msg-text" style="margin-top:4px">${m.text}</div>` : ""}`;
      } else if (m.type === "image") {
        content = `<div class="star-msg-text" style="opacity:.6">📷 תמונה</div>`;
      } else {
        content = `<div class="star-msg-text">${m.deleted ? "<em style='opacity:.6'>ההודעה נמחקה</em>" : (m.text || "")}</div>`;
      }
      return `<div class="star-msg-card"><div class="star-msg-top"><span class="star-msg-who">${who}</span><span class="star-msg-time">${time}</span></div>${content}</div>`;
    }).join("");
  }
  document.getElementById("starred-overlay").classList.add("show");
}

/* ── מדיה: כל התמונות בצ'אט מכל הצדדים (#6) ── */
function openMedia() {
  const c = allClients[curPhone] || {};
  const body = document.getElementById("media-body");
  const all = c.messages ? Object.entries(c.messages).filter(([, m]) => m.type === "image" && m.imageUrl && !m.deleted) : [];
  all.sort((a, b) => (b[1].at || 0) - (a[1].at || 0));
  if (!all.length) {
    body.innerHTML = `<div class="panel-empty">אין תמונות בצ'אט הזה</div>`;
  } else {
    body.innerHTML = `<div class="media-grid">${all.map(([key, m]) => {
      const who = (m.sender === "agent") ? "אתה" : (c.name || "לקוח");
      const time = fmtDate(m.at);
      return `<div class="media-cell" onclick="window.openLightbox('${m.imageUrl}')"><img src="${m.imageUrl}" alt="תמונה" loading="lazy"/><div class="media-meta">${who} · ${time}</div></div>`;
    }).join("")}</div>`;
  }
  document.getElementById("media-overlay").classList.add("show");
}
function goBack() { if (curListener) { curListener(); curListener = null; } if (typingListener) { typingListener(); typingListener = null; } if (presenceListener) { presenceListener(); presenceListener = null; } sendTyping(false); curPhone = null; showScreen("s-list"); }
function showScreen(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); if(window.__hideBoot)window.__hideBoot(); }
function closeSheet(id) { document.getElementById(id).classList.remove("show"); }
function toast(msg) { const el = document.createElement("div"); el.className = "toast"; el.textContent = msg; document.getElementById("toast-wrap").appendChild(el); setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }, 2500); }

/* חלון אישור מותאם (#28) */
function showConfirmSheet(title, text, onOk) {
  const ov = document.getElementById("confirm-overlay");
  document.getElementById("confirm-title").textContent = title;
  document.getElementById("confirm-text").textContent = text;
  const okBtn = document.getElementById("confirm-ok");
  const cancelBtn = document.getElementById("confirm-cancel");
  const close = () => ov.classList.remove("show");
  okBtn.onclick = () => { close(); onOk?.(); };
  cancelBtn.onclick = close;
  ov.onclick = e => { if (e.target === ov) close(); };
  ov.classList.add("show");
}
function fmtPhone(p) { const s = String(p).replace(/\D/g, ""); return s.length === 10 ? s.slice(0, 3) + "-" + s.slice(3) : s; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" }); }
function fmtDate(ts) { if (!ts) return ""; const d = new Date(ts); const today = new Date(); if (d.toDateString() === today.toDateString()) return fmtTime(ts); return d.toLocaleDateString("he-IL"); }
/* תאריך יחסי: היום / אתמול / שלשום / תאריך מלא עם שנה (#17/#24) */
function fmtSeen(ts) { if (!ts) return ""; const d = new Date(ts); const now = new Date(); const tm = fmtTime(ts); const sod = x => { const t = new Date(x); t.setHours(0,0,0,0); return t.getTime(); }; const days = Math.round((sod(now) - sod(d)) / 864e5); if (days === 0) return `היום ${tm}`; if (days === 1) return `אתמול ${tm}`; if (days === 2) return `שלשום ${tm}`; return `${d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"numeric"})} ${tm}`; }

    /* ── אווטרים ── */
    const AV_BASE = "https://api.dicebear.com/7.x/avataaars/svg";
    const AV_LIST = {

        {seed:"david",bg:"b6e3f4"},{seed:"yosef",bg:"c0aede"},{seed:"moshe",bg:"ffd5dc"},
        {seed:"avi",bg:"d1d4f9"},{seed:"ron",bg:"ffdfbf"},{seed:"dan",bg:"c1e1c5"},
        {seed:"eyal",bg:"ffe4b5"},{seed:"noam",bg:"ffc0cb"},{seed:"tal",bg:"d2b48c"},{seed:"omer",bg:"e8e8e8"}
      ],
      female: [
        {seed:"maya",bg:"b6e3f4"},{seed:"shira",bg:"c0aede"},{seed:"noa",bg:"ffd5dc"},
        {seed:"yael",bg:"d1d4f9"},{seed:"dana",bg:"ffdfbf"},{seed:"lior",bg:"c1e1c5"},
        {seed:"mia",bg:"ffe4b5"},{seed:"tamar",bg:"ffc0cb"},{seed:"eden",bg:"d2b48c"},{seed:"gal",bg:"e8e8e8"}
      ]
    };
    function avUrl(s,b,g){return AV_BASE+"?seed="+s+"&backgroundColor="+b+"&gender="+g;}
    

    /* ── דירוג כוכבים ── */
    let selectedRating = 0;
    function showRating() {
      selectedRating = 0;
      document.querySelectorAll(".rating-star").forEach(s => s.classList.remove("active"));
      document.getElementById("rating-overlay").classList.add("show");
    }
    document.querySelectorAll(".rating-star").forEach(star => {
      star.onclick = async () => {
        selectedRating = parseInt(star.dataset.v);
        document.querySelectorAll(".rating-star").forEach((s,i) => s.classList.toggle("active", i < selectedRating));
        if (curPhone) await set(ref(db, "clients/"+curPhone+"/rating"), selectedRating);
        setTimeout(() => document.getElementById("rating-overlay").classList.remove("show"), 600);
        toast("תודה על הדירוג ⭐");
      };
    });
    document.getElementById("rating-skip").onclick = () => document.getElementById("rating-overlay").classList.remove("show");
    

    /* ── נציג אחד בשיחה — בדיקה לפני כניסה ── */
    async function checkAndEnterChat(phone) {
      const snap = await get(ref(db, "clients/"+phone+"/activeAgent"));
      if (snap.exists()) {
        const data = snap.val();
        const myId = JSON.parse(localStorage.getItem("wdc_admin_session")||"{}").userId || "admin";
        if (data.id !== myId && Date.now() - (data.at||0) < 2*60*1000) {
          toast("נציג אחר כבר בשיחה עם לקוח זה");
          return false;
        }
      }
      /* רושם נציג פעיל */
      const myId = JSON.parse(localStorage.getItem("wdc_admin_session")||"{}").userId || "admin";
      await set(ref(db, "clients/"+phone+"/activeAgent"), {id: myId, name: (typeof currentUser!=="undefined"&&currentUser?.name) || ADMIN_USER || "נציג", at: Date.now()});
      /* heartbeat */
      const hb = setInterval(async () => {
        if (!chatPhone) { clearInterval(hb); return; }
        await set(ref(db, "clients/"+chatPhone+"/activeAgent/at"), Date.now());
      }, 30000);
      return true;
    }

    async function releaseAgent(phone) {
      if (!phone) return;
      await remove(ref(db, "clients/"+phone+"/activeAgent")).catch(()=>{});
    }
    

    /* ── פתח שיחה מחדש ── */
    window.startNewChat = async () => {
      if (!chatPhone) return;
      /* מסיר הודעות סגירה */
      const snap = await get(ref(db, "clients/"+chatPhone+"/messages"));
      if (snap.exists()) {
        Object.entries(snap.val()).forEach(([key,m]) => {
          if (m.type === "closed") remove(ref(db, "clients/"+chatPhone+"/messages/"+key));
        });
      }
      document.getElementById("cv-closed-ban").classList.remove("show");
      document.getElementById("chat-ta").disabled = false;
      document.getElementById("chat-send-btn").disabled = false;
      document.getElementById("btn-init-msg").style.display = "none";
      document.getElementById("btn-close-conv").style.display = "";
      toast("שיחה נפתחה", "s");
    };
    

    /* ── בדיקת התראות הרשאה ── */
    function checkPermNotify() {
      const s = JSON.parse(localStorage.getItem("wdc_admin_session")||"{}");
      if (!s.userId || s.role === "admin") return;
      onValue(ref(db, "team/"+s.userId+"/permNotify"), snap => {
        if (!snap.exists()) return;
        const n = snap.val();
        if (n.approved && n.at && Date.now() - n.at < 10000) {
          /* הודעה חדשה */
          const d = document.createElement("div");
          d.style.cssText = "position:fixed;top:calc(var(--safe-top) + 70px);left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border-radius:14px;padding:12px 20px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 8px 24px rgba(34,197,94,.4);white-space:nowrap;font-family:'Heebo',sans-serif;animation:fadeIn .3s ease";
          d.textContent = "✓ הרשאה אושרה: " + n.action;
          document.body.appendChild(d);
          setTimeout(() => d.remove(), 4000);
          remove(ref(db, "team/"+s.userId+"/permNotify")).catch(()=>{});
        }
      });
    }
    checkPermNotify();
    

    /* ══ תמונות בצ'אט מובייל — זום, preview, חד-פעמי ══ */
    let clbScale=1,clbX=0,clbY=0,clbSD=0,clbSS=1,clbLX=0,clbLY=0;
    function clbApply(){const i=document.getElementById("lightbox-img");if(i)i.style.transform=`translate(${clbX}px,${clbY}px) scale(${clbScale})`;}
    function clbReset(){clbScale=1;clbX=0;clbY=0;clbApply();}
    window.openLightbox = (url) => {
      const img=document.getElementById("lightbox-img");
      const ld=document.getElementById("lb-loading");
      clbReset();
      document.getElementById("img-lightbox").classList.add("show");
      img.style.visibility="hidden";
      if(ld)ld.classList.add("show");
      img.onload=()=>{img.style.visibility="visible";if(ld)ld.classList.remove("show");};
      img.onerror=()=>{if(ld)ld.querySelector(".img-sk-txt").textContent="שגיאה בטעינת התמונה";};
      img.src=url;
    };
    (function initClbZoom(){
      const lb=document.getElementById("img-lightbox"),img=document.getElementById("lightbox-img");
      if(!lb||!img)return;
      img.addEventListener("dblclick",e=>{e.stopPropagation();clbScale=clbScale>1?1:2.5;clbX=0;clbY=0;clbApply();});
      img.addEventListener("touchstart",e=>{if(e.touches.length===2){clbSD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);clbSS=clbScale;}else if(e.touches.length===1&&clbScale>1){clbLX=e.touches[0].clientX;clbLY=e.touches[0].clientY;}},{passive:true});
      img.addEventListener("touchmove",e=>{if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);clbScale=Math.min(5,Math.max(1,clbSS*(d/clbSD)));if(clbScale===1){clbX=0;clbY=0;}clbApply();}else if(e.touches.length===1&&clbScale>1){e.preventDefault();clbX+=e.touches[0].clientX-clbLX;clbY+=e.touches[0].clientY-clbLY;clbLX=e.touches[0].clientX;clbLY=e.touches[0].clientY;clbApply();}},{passive:false});
      lb.addEventListener("click",e=>{if(e.target===lb){lb.classList.remove("show");clbReset();cFinalizeOneTime();}});
      img.addEventListener("click",e=>e.stopPropagation());
    })();

    /* תמונה חד-פעמית — צפייה עד סגירה, ואז חסימה + מחיקת URL מהשרת (#35) */
    let cPendingOneTimeClose=null;
    window.openOneTimeImg = async (key,m,isAgent) => {
      if(m.viewed && !isAgent){ toast("התמונה כבר נצפתה"); return; }
      openLightbox(m.imageUrl);
      /* החסימה תתבצע בסגירת ה-lightbox, לא בפתיחה */
      if(!isAgent && !m.viewed){ cPendingOneTimeClose=key; }
    };
    async function cFinalizeOneTime(){
      if(!cPendingOneTimeClose || !curPhone) return;
      const key=cPendingOneTimeClose; cPendingOneTimeClose=null;
      try{
        /* סימון כנצפתה + מחיקת ה-URL מהשרת (אבטחה + פינוי מקום) */
        await update(ref(db,`clients/${curPhone}/messages/${key}`),{viewed:true,viewedAt:Date.now(),imageUrl:null});
      }catch(e){console.error(e);}
    }
    window.cFinalizeOneTimeClose=cFinalizeOneTime;

    let cPendingFile=null, cPendingOneTime=false;
    document.getElementById("chat-img-btn").onclick = () => {
      document.getElementById("chat-file-input").click();
    };
    document.getElementById("chat-file-input").onchange = (e) => {
      const file = e.target.files[0];
      if (!file || !curPhone) return;
      e.target.value = "";
      if (!file.type.startsWith("image/")) { toast("ניתן להעלות תמונות בלבד"); return; }
      if (file.size > 10 * 1024 * 1024) { toast("הקובץ גדול מדי — מקסימום 10MB"); return; }
      cPendingFile=file; cPendingOneTime=false;
      const r=new FileReader();
      r.onload=ev=>{document.getElementById("cimg-thumb").src=ev.target.result;document.getElementById("cimg-onetime").classList.remove("active");document.getElementById("cimg-caption").value="";document.getElementById("cimg-preview").classList.add("show");};
      r.readAsDataURL(file);
    };
    window.cCancelPreview=()=>{cPendingFile=null;cPendingOneTime=false;document.getElementById("cimg-preview").classList.remove("show");};
    window.cToggleOneTime=()=>{cPendingOneTime=!cPendingOneTime;document.getElementById("cimg-onetime").classList.toggle("active",cPendingOneTime);};
    window.cSendImg=async()=>{
      if(!cPendingFile||!curPhone)return;
      const file=cPendingFile, caption=document.getElementById("cimg-caption").value.trim(), oneTime=cPendingOneTime;
      const sb=document.getElementById("cimg-send"); sb.disabled=true;
      cCancelPreview();
      /* בועת העלאה זמנית — משוב מיידי (#3) */
      const container=document.getElementById("msgs-container");
      const typingRow=document.getElementById("typing-row");
      const pend=document.createElement("div");
      pend.className="msg-row me";
      pend.innerHTML=`<div class="msg-bubble"><div class="img-skeleton" style="animation:none"><div class="img-sk-inner"><svg class="img-gspin" width="34" height="34" viewBox="0 0 50 50"><circle class="img-gspin-track" cx="25" cy="25" r="20" fill="none" stroke-width="5"/><circle class="img-gspin-arc" cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke-linecap="round"/></svg><div class="img-sk-txt" style="display:block">מעלה תמונה…</div></div></div></div>`;
      if(container){container.insertBefore(pend,typingRow);container.scrollTop=container.scrollHeight;}
      try{
        const ext=file.name.split('.').pop()||'jpg';
        const snapshot=await uploadBytes(sRef(storage,"chat-images/"+curPhone+"/"+Date.now()+"."+ext),file);
        const url=await getDownloadURL(snapshot.ref);
        const key="msg_"+Date.now();
        const msg={text:caption||"",imageUrl:url,at:Date.now(),sender:"agent",agentRead:true,clientRead:false,agentName:(typeof currentUser!=="undefined"&&currentUser?.name)||ADMIN_USER||"נציג",type:"image"};
        if(oneTime){msg.oneTime=true;msg.viewed=false;}
        if(replyTo){msg.replyTo=buildReplyMeta(replyTo);cancelReply();}
        await set(ref(db,"clients/"+curPhone+"/messages/"+key),msg);
        pend.remove(); /* יוחלף בהודעה האמיתית מה-listener */
        toast("✓ תמונה נשלחה");
      }catch(err){pend.remove();toast("שגיאה בהעלאה");console.error(err);}
      finally{sb.disabled=false;}
    };

/* ── מודול אופליין (#8): באנר + חסימת פעולות בזמן אין אינטרנט ── */
(function(){
  const banner=document.getElementById("offline-banner");
  function update(){
    const off=!navigator.onLine;
    if(banner)banner.classList.toggle("show",off);
    document.body.classList.toggle("is-offline",off);
  }
  document.addEventListener("click",e=>{
    if(navigator.onLine)return;
    const t=e.target.closest("button,a,.as-item,[onclick]");
    if(!t)return;
    if(t.id&&/close|cancel|back|skip|מבטל/i.test(t.id))return;
    e.preventDefault();e.stopPropagation();
    try{toast("אין חיבור לאינטרנט — נסה שוב כשהחיבור יחזור");}catch(_){}
  },true);
  window.addEventListener("online",update);
  window.addEventListener("offline",update);
  update();
})();

</script>
